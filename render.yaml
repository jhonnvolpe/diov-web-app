services:
  - type: web
    name: diov-web-app
    runtime: static
    buildCommand: |
      rm -rf node_modules package-lock.json
      npm cache clean --force
      npm install --no-package-lock
      npx vite build
    staticPublishPath: dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://diov-api.onrender.com/api/trpc
