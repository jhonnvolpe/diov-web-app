# DIOV — Render Deployment Configuration
# 
# This repo contains BOTH frontend (React) and backend (tRPC API).
# Deploy them as separate services on Render:
#
# 1. diov-web-app → Static Site (frontend only)
#    Build: npm install && npm run build
#    Publish: dist/public
#
# 2. diov-api → Web Service (backend API)
#    Build: npm install && npm run build
#    Start: npm start
#    Environment: DATABASE_URL (from diov-db)
#
# 3. diov-db → PostgreSQL (already provisioned)

services:
  # Frontend — Static Site
  - type: web
    name: diov-web-app
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://diov-api.onrender.com/api/trpc
      - key: NODE_VERSION
        value: "20"

  # Backend — Web Service (uncomment when ready to deploy API from this repo)
  # - type: web
  #   name: diov-api
  #   runtime: node
  #   buildCommand: npm install && npm run build
  #   startCommand: npm start
